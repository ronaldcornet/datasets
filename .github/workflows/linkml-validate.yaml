name: Validate LinkML Schemas

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    paths:
      - "schemas/**"
      - "tools/**"
      - "data/**"
      - ".github/workflows/linkml-validate.yaml"
  pull_request:
    paths:
      - "schemas/**"
      - "tools/**"
      - "data/**"
      - ".github/workflows/linkml-validate.yaml"

jobs:
  linkml-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate LinkML schemas
        run: |
          python tools/validate_linkml_schema.py

      - name: Validate instances against schemas
        run: |
          python tools/validate_instances.py

      - name: Generate JSON Schema from LinkML
        run: |
          mkdir -p web
          # Use whatever is appropriate for your CLI; one of these will work depending on version:
          # gen-json-schema schemas/person.yaml > web/person.schema.json
          gen-json-schema schemas/person.yaml --target_class=Person --top_class Person > web/person.schema.json
          # or:
          # linkml generate json-schema schemas/person.yaml > web/person.schema.json

      - name: Upload JSON Schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: json-schemas
          path: web/
